services:
  # SERVICIO DE BASE DE DATOS (Postgres)
  db:
    image: postgres:16-alpine
    container_name: websegura_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-websegura_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Opcional: Si tienes un archivo .sql inicial para crear las tablas
      # - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-websegura_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SERVICIO DEL BACKEND (Node.js)
  app:
    build: ./backend
    container_name: websegura_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      # IMPORTANTE: Dentro de Docker, el host de la DB no es "localhost", es "db"
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: